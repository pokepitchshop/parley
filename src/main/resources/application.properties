spring.application.name=parley
spring.profiles.default=local

# MongoDB (local default; Azure uses Key Vault secret via SPRING_DATA_MONGODB_URI)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/parley}

# LLM: profile-specific — local → application-local.properties (OpenAI.com);
# azure → application-azure.properties (Azure OpenAI). See docs/llm-provider.md

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}

# Voice tuning (POK-12) — see docs/e2e-test-call.md
parley.voice.say-voice=POLLY_JOANNA_NEURAL
parley.voice.speech-timeout=3
parley.voice.max-turns-per-call=25
parley.voice.max-tool-calls-per-call=5

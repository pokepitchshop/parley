spring.application.name=parley
spring.profiles.default=local
server.forward-headers-strategy=framework

# Repo-root .env (IDE runs, bootRun, tests). optional: — absent on Container Apps / CI.
spring.config.import=optional:file:.env[.properties]

# MongoDB — Spring Boot 4: spring.mongodb.uri (not spring.data.mongodb.uri).
# Set SPRING_DATA_MONGODB_URI in .env locally; Container Apps inject it from Key Vault.
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/parley}
# LLM: Azure OpenAI only — local uses API key; azure profile is keyless MI. See docs/llm-provider.md.

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}

# Public HTTPS/WSS base (no trailing slash, no /voice suffix) — ngrok or Azure app_url
parley.public-url.base=${PUBLIC_BASE_URL:}

# Voice tuning (POK-12) — see docs/e2e-test-call.md
parley.voice.say-voice=POLLY_JOANNA_NEURAL
parley.voice.speech-timeout=3
parley.voice.max-turns-per-call=25
parley.voice.max-tool-calls-per-call=5
# relay (default) = ConversationRelay on POST /voice; turn = legacy Gather/Say loop (local dev only)
parley.voice.mode=relay

# Shop context (POK-445 Phase 0) — static store facts injected per turn
parley.shop.store-name=Poke Pitch Shop
parley.shop.ebay-seller-name=Poke Pitch Shop
parley.shop.shipping-blurb=We ship trading cards nationwide through eBay with careful packaging.
parley.shop.pickup-blurb=Local pickup may be available by arrangement — ask and we can check.
parley.shop.tone-hint=Sound like a friendly collector who runs a small eBay shop. Mention eBay when callers want to browse or buy.

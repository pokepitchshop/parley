# Azure Container Apps: Microsoft Foundry (Azure OpenAI) via Spring AI 2.0 openai starter.
# Keyless: DefaultAzureCredential + Cognitive Services OpenAI User RBAC — see docs/llm-provider.md.
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:}
spring.ai.openai.microsoft-foundry=true
spring.ai.openai.chat.microsoft-deployment-name=${SPRING_AI_OPENAI_CHAT_MICROSOFT_DEPLOYMENT_NAME:gpt-4.1-mini}
spring.ai.openai.chat.options.temperature=0.7
